worker_processes auto;

events {
  worker_connections 4096;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 65;

  proxy_cache_path /var/cache/nginx/hls levels=1:2 keys_zone=hls_cache:100m max_size=10g inactive=12h use_temp_path=off;

  upstream api_backend {
    server backend:8000;
    keepalive 64;
  }

  upstream frontend_app {
    server frontend:5173;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # App/API traffic
    location / {
      proxy_pass http://frontend_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://api_backend/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $request_id;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 3s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    # Cache HLS playlists/segments aggressively.
    location ~* ^/media/hls/.*\.(m3u8|ts)$ {
      proxy_pass http://api_backend;
      proxy_cache hls_cache;
      proxy_cache_valid 200 206 10m;
      proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504 updating;
      proxy_cache_lock on;
      add_header X-Cache-Status $upstream_cache_status always;
      expires 10m;
    }

    # Cache thumbnails.
    location ~* ^/media/thumbs/.*\.(jpg|jpeg|png|webp)$ {
      proxy_pass http://api_backend;
      proxy_cache hls_cache;
      proxy_cache_valid 200 1h;
      add_header X-Cache-Status $upstream_cache_status always;
      expires 1h;
    }
  }
}
